name: Daily Instagram Post

on:
  schedule:
    # 毎日日本時間の朝（例：23:00 UTC = 8:00 JST）に実行
    - cron: '0 23 * * *'
  workflow_dispatch: # 手動実行ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth Pillow requests python-dotenv

      - name: Create credentials.json
        run: echo "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" > credentials.json

      - name: Run script
        env:
          CALENDAR_ID: ${{ secrets.CALENDAR_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
        run: python main.py

      # ✨ ここがポイント！生成された画像をリポジトリに保存する
      - name: Commit and Push final_stories.png
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add final_stories.png
          git commit -m "Update today's schedule image" || echo "No changes to commit"
          git push
