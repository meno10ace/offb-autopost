name: Daily Auto Post

on:
  schedule:
    # 日本時間の13:00（UTCの04:00）に自動実行
    - cron: '13 4 * * *'
  workflow_dispatch:

jobs:
  run_bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Git Pushするための権限

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libs
        run: pip install google-api-python-client google-auth Pillow requests python-dotenv

      - name: Create credentials.json
        env:
          JSON_KEY: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: echo "$JSON_KEY" > credentials.json
        
      # ① 画像を作る（必要なのはカレンダーの情報だけ）
      - name: 1. Generate Image
        env:
          CALENDAR_ID: ${{ secrets.CALENDAR_ID }}
        run: python generate.py

      # ② 画像をリポジトリに上書き保存する
      - name: 2. Save Image to GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add final_stories.png
          git commit -m "Update today's image" || echo "No changes"
          git push

      # ③ 投稿する（必要なのはInstagramの情報だけ）
      - name: 3. Post to Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
        run: |
          sleep 10 # URLが安定するまで少し待つ

          python post.py

